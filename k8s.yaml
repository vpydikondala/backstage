apiVersion: v1
kind: Namespace
metadata:
  name: backstage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: backstage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: backstage
  namespace: backstage
---
# Option A: keep the ConfigMap here (paste your app-config.yaml content)
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: backstage
data:
  app-config.yaml: |
    # paste the SAME contents as your backstage/app-config.yaml here
    # (with ${ENV_VARS} placeholders intact)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      serviceAccountName: backstage
      imagePullSecrets:
      - name: ghcr-creds
      containers:
      - name: backstage
        image: ghcr.io/vpydikondala/backstage:latest   # build this against minikube’s docker
        imagePullPolicy: IfNotPresent
        env:
        - name: BACKSTAGE_DB_PASSWORD
          valueFrom: { secretKeyRef: { name: backstage-db, key: password } }
        - name: GITHUB_PERSONAL_ACCESS_TOKEN
          valueFrom: { secretKeyRef: { name: github-pat, key: token } }
        - name: GITHUB_CLIENT_ID
          valueFrom: { secretKeyRef: { name: github-oauth, key: clientId } }
        - name: GITHUB_CLIENT_SECRET
          valueFrom: { secretKeyRef: { name: github-oauth, key: clientSecret } }
        - name: ARGOCD_TOKEN
          valueFrom: { secretKeyRef: { name: argocd-token, key: token } }  # optional
        volumeMounts:
        - name: config
          mountPath: /app/app-config.yaml
          subPath: app-config.yaml
      volumes:
      - name: config
        configMap: { name: app-config }
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage
spec:
  selector:
    app: backstage
  ports:
  - name: http
    port: 7007
    targetPort: 7007
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage
  namespace: backstage
spec:
  ingressClassName: nginx
  rules:
  - host: backstage.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backstage
            port:
              number: 7007
