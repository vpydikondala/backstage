apiVersion: v1
kind: Namespace
metadata:
  name: backstage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: backstage
data:
  app-config.yaml: |
    app:
      title: Backstage (IDP PoC)
      baseUrl: http://backstage.local

    backend:
      baseUrl: http://backstage.local
      listen:
        port: 7007
      cors:
        origin: http://backstage.local
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: postgresql.backstage.svc.cluster.local
          port: 5432
          user: backstage
          password: BACKSTAGE_DB_PASSWORD
          database: backstage

    integrations:
      github:
        - host: github.com
          token: GITHUB_PERSONAL_ACCESS_TOKEN

    auth:
      environment: development
      providers:
        github:
          development:
            clientId: GITHUB_OAUTH_CLIENT_ID
            clientSecret: GITHUB_OAUTH_CLIENT_SECRET

    techdocs:
      builder: 'local'
      publisher:
        type: 'local'

    catalog:
      rules:
        - allow: [Component, API, Location, Resource, System, Domain, Group, User]
      locations:
        - type: url
          target: https://github.com/YOUR_GH_ORG?type=all
          rules:
            - allow: [Component, System, Resource, API]
        - type: file
          target: ./templates

    kubernetes:
      serviceLocatorMethod:
        type: 'multiTenant'
      clusterLocatorMethods:
        - type: 'config'
          clusters:
            - name: minikube
              url: https://kubernetes.default.svc
              authProvider: 'serviceAccount'
              skipTLSVerify: true
      customResources: []

    argocd:
      baseUrl: http://argocd-server.argocd.svc.cluster.local
      appLocatorMethods:
        - type: 'annotations'

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: backstage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-readonly
subjects:
  - kind: ServiceAccount
    name: backstage
    namespace: backstage
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  selector:
    matchLabels: {{ app: backstage }}
  template:
    metadata:
      labels: {{ app: backstage }}
    spec:
      serviceAccountName: backstage
      containers:
        - name: backstage
          image: backstage-poc:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKSTAGE_DB_PASSWORD
              value: "BACKSTAGE_DB_PASSWORD"
            - name: ARGOCD_TOKEN
              value: "REPLACE_WITH_ARGOCD_READONLY_TOKEN"
          volumeMounts:
            - name: config
              mountPath: /app/app-config.yaml
              subPath: app-config.yaml
      volumes:
        - name: config
          configMap:
            name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage
spec:
  type: ClusterIP
  selector: {{ app: backstage }}
  ports:
    - port: 7007
      targetPort: 7007
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage
  namespace: backstage
spec:
  ingressClassName: nginx
  rules:
    - host: backstage.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backstage
                port:
                  number: 7007
