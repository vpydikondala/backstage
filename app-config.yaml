app:
  title: Backstage (IDP PoC)
  baseUrl: http://backstage.local

backend:
  baseUrl: http://backstage.local
  listen:
    port: 7007
  cors:
    origin: http://backstage.local
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: postgresql.backstage.svc.cluster.local
      port: 5432
      user: backstage
      password: ${BACKSTAGE_DB_PASSWORD}
      database: backstage

integrations:
  github:
    - host: github.com
      token: ${GITHUB_PERSONAL_ACCESS_TOKEN}

auth:
  environment: development
  providers:
    github:
      development:
        clientId: ${GITHUB_CLIENT_ID}
        clientSecret: ${GITHUB_CLIENT_SECRET}

techdocs:
  builder: local
  publisher:
    type: local

catalog:
  rules:
    - allow: [Component, System, Domain, Group, User, API, Resource, Location, Template]
  locations:
    # 1) local org/system/groups
    - type: file
      target: ./catalog
    # 2) your templates
    - type: file
      target: ./templates
    # 3) auto-discover all catalog-info.yaml in your GitHub org/user
    - type: github-discovery
      target: https://github.com/vpydikondala/*

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: minikube
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          skipTLSVerify: true

# Optional: Argo CD plugin (remove if you don’t need the Argo card)
argocd:
  baseUrl: http://argocd-server.argocd.svc.cluster.local
  appLocatorMethods:
    - type: annotations
  token: ${ARGOCD_TOKEN}
