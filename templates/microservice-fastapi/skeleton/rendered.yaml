---
# Source: backstage/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: backstage-backstage
spec:
  selector:
    app: backstage
  ports:
    - name: http
      port: 80
      targetPort: 7007
  type: ClusterIP
---
# Source: backstage/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage-backstage
  labels:
    app: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backstage
          image: ghcr.io/vpydikondala/backstage:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "7007"
          ports:
            - containerPort: 7007
          livenessProbe:
            httpGet:
              path: /health
              port: 7007
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7007
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: BACKSTAGE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: password
            - name: token
              valueFrom:
                secretKeyRef:
                  name: argocd-token
                  key: token
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-pat
                  key: token
            - name: GITHUB_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: clientId
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: clientSecret
---
# Source: backstage/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage-backstage
spec:
  ingressClassName: nginx
  rules:
    - host: "backstage.local"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backstage-backstage
                port:
                  number: 80
