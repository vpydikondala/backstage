apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vpydikondala/backstage.git   # <-- your Backstage repo
    targetRevision: main                                     # or your branch
    path: backstage                                          # folder that contains k8s.yaml
    directory:
      recurse: false                                         # apply plain YAMLs in that folder
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
