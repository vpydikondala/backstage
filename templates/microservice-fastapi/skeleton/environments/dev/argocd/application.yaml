apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/vpydikondala/BACKSTAGE.git'  # Update with your repo URL
    targetRevision: HEAD
    path: 'templates/microservice-fastapi/chart'                # Path to your Helm chart folder
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
