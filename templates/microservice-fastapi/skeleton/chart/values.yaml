# ---- image ----
image:
  repository: ghcr.io/vpydikondala/backstage-ui
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []    # e.g. [{ name: ghcr-creds }]

# ---- pod basics ----
replicaCount: 1
serviceAccount:
  name: backstage
rbac:
  create: true

# ---- service ----
service:
  type: ClusterIP
  port: 7007
  targetPort: 7007

# ---- ingress ----
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: backstage.local
      paths:
        - path: /
          pathType: Prefix
  annotations: {}      # add nginx annotations if needed
  tls: []              # e.g. [{ hosts: ["backstage.local"], secretName: backstage-tls }]

# ---- app-config ----
# Paste your full Backstage app-config.yaml under "appConfig" as a multiline string.
# Keep ${ENV_VARS} placeholders intact—they come from K8s Secrets via env vars below.
appConfig: |
  app:
    title: Backstage (IDP PoC)
    baseUrl: http://backstage.local
  backend:
    baseUrl: http://backstage.local
    listen: { port: 7007 }
    cors:
      origin: http://backstage.local
      methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
      credentials: true
    database:
      client: pg
      connection:
        host: postgresql.backstage.svc.cluster.local
        port: 5432
        user: backstage
        password: ${BACKSTAGE_DB_PASSWORD}
        database: backstage
  integrations:
    github:
      - host: github.com
        token: ${GITHUB_PERSONAL_ACCESS_TOKEN}
  auth:
    environment: development
    providers:
      github:
        development:
          clientId: ${GITHUB_OAUTH_CLIENT_ID}
          clientSecret: ${GITHUB_OAUTH_CLIENT_SECRET}
  techdocs:
    builder: local
    publisher: { type: local }
  catalog:
    rules:
      - allow: [Component, API, Location, Resource, System, Domain, Group, User]
    locations:
      - type: url
        target: https://github.com/vpydikondala?type=all
        rules: [ { allow: [Component, System, Resource, API] } ]
      - type: file
        target: ./templates
  kubernetes:
    serviceLocatorMethod: { type: multiTenant }
    clusterLocatorMethods:
      - type: config
        clusters:
          - name: minikube
            url: https://kubernetes.default.svc
            authProvider: serviceAccount
            skipTLSVerify: true
    customResources: []
  proxy:
    "/argocd/api":
      target: http://argocd-server.argocd.svc.cluster.local/api/v1/
      changeOrigin: true
      secure: false
      headers:
        Cookie:
          $env: ARGOCD_TOKEN
  argocd:
    baseUrl: http://argocd-server.argocd.svc.cluster.local
    appLocatorMethods:
      - type: annotations

# ---- env (from existing secrets) ----
secrets:
  database:
    name: backstage-db       # or 'postgresql' if that’s your secret name
    key: password
  githubPAT:
    name: github-pat
    key: token
  githubOAuth:
    name: github-oauth
    clientIdKey: clientId
    clientSecretKey: clientSecret
  argocdToken:               # optional; only if you want Argo CD proxy working
    enabled: true
    name: argocd-token
    key: token
