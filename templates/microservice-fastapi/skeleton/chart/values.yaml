replicaCount: 1

image:
  repository: ghcr.io/{{ ghOrg }}/{{ name }}
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []   # e.g. - name: ghcr-creds

service:
  port: 80
  targetPort: 7007

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: {{ host }}
      paths:
        - path: /
          pathType: Prefix
