apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: microservice-fastapi
  title: Microservice (FastAPI + Helm + Argo CD)
  description: Scaffold a FastAPI service with Dockerfile, Helm chart, Argo CD app, TechDocs, and CI for GHCR.
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service Info
      required: [name, owner, system, host, namespace, ghOrg]
      properties:
        name:
          type: string
          title: Service name (kebab-case)
          pattern: '^[a-z0-9-]+$'
        owner:
          type: string
          title: Owner (Backstage Group, e.g. team-product)
        system:
          type: string
          title: System (Backstage System)
          default: core
        namespace:
          type: string
          title: Kubernetes namespace
          default: default
        host:
          type: string
          title: Ingress host (e.g. svc.local)
          default: product.local
        ghOrg:
          type: string
          title: GitHub org/user to create repo under (e.g. your-gh-user)
          default: YOUR_GH_ORG

  steps:
    - id: fetch
      name: Fetch template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: '{{ parameters.name }}'
          owner: '{{ parameters.owner }}'
          system: '{{ parameters.system }}'
          namespace: '{{ parameters.namespace }}'
          host: '{{ parameters.host }}'
          ghOrg: '{{ parameters.ghOrg }}'

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: 'Microservice scaffolded by Backstage'
        repoUrl: 'github.com?owner={{ parameters.ghOrg }}&repo={{ parameters.name }}'
        defaultBranch: main
        protectDefaultBranch: false

    - id: register
      name: Register in Backstage catalog
      action: catalog:register
      input:
        repoContentsUrl: '{{ steps.publish.output.repoContentsUrl }}'
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Open Repository
        url: '{{ steps.publish.output.remoteUrl }}'
      - title: Open in Backstage
        icon: catalog
        entityRef: 'component:{{ parameters.name }}'
