# Force the chart to use quay.io for ALL Argo CD containers (and initContainers like copyutil)
global:
  image:
    repository: quay.io/argoproj/argocd
    tag: v2.10.8
    imagePullPolicy: IfNotPresent

# (Not strictly required when global.* is set, but we pin for clarity)
controller:
  image:
    repository: quay.io/argoproj/argocd
    tag: v2.10.8

repoServer:
  image:
    repository: quay.io/argoproj/argocd
    tag: v2.10.8

server:
  image:
    repository: quay.io/argoproj/argocd
    tag: v2.10.8

# Dex & Redis (use known-good registries you’ve already preloaded)
dex:
  image:
    repository: ghcr.io/dexidp/dex
    tag: v2.43.1

redis:
  image:
    repository: docker.io/redis
    tag: 7.2-alpine
